apiVersion: v1
kind: Pod
metadata:
  name: vllm-qwen3-235b
spec:
  restartPolicy: Always
  hostIPC: true
  nodeSelector:
    compute.coreweave.com/node-pool: lukas-4h200-pool
  containers:
    - name: vllm
      image: vllm/vllm-openai:nightly
      env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
      args:
        - "--model"
        - "Qwen/Qwen3-235B-A22B"
        - "--tensor-parallel-size"
        - "4"
        - "--max-model-len"
        - "8192"
        - "--gpu-memory-utilization"
        - "0.95"
        - "--dtype"
        - "bfloat16"
        - "--enable-prefix-caching"
        - "--enable-chunked-prefill"
        - "--trust-remote-code"
      resources:
        limits:
          nvidia.com/gpu: 4
      ports:
        - containerPort: 8000
