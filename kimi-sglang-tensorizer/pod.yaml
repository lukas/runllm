apiVersion: v1
kind: Pod
metadata:
  name: sglang-kimi-tensorizer
spec:
  restartPolicy: Always
  hostIPC: true
  nodeSelector:
    compute.coreweave.com/node-pool: lukas-4h200-pool
  containers:
    - name: sglang
      image: lbiewald/sglang-tensorizer:latest
      env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HF_HOME
          value: /mnt/models/hf-cache
      command: ["/bin/bash", "-lc"]
      args:
        - |
          exec sglang serve \
            --model-path moonshotai/Kimi-K2.5 \
            --served-model-name moonshotai/Kimi-K2.5 \
            --host 0.0.0.0 \
            --port 8000 \
            --tp-size 8 \
            --context-length 8192 \
            --mem-fraction-static 0.9 \
            --reasoning-parser kimi_k2 \
            --tool-call-parser kimi_k2 \
            --trust-remote-code \
            --load-format tensorizer \
            --model-loader-extra-config '{"tensorizer_uri": "/mnt/models/sglang/moonshotai/Kimi-K2.5/v1/model-rank-%03d.tensors"}'
      resources:
        limits:
          nvidia.com/gpu: 8
      ports:
        - containerPort: 8000
      volumeMounts:
        - name: models
          mountPath: /mnt/models
  volumes:
    - name: models
      persistentVolumeClaim:
        claimName: models
