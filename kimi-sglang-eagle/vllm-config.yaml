apiVersion: v1
kind: Pod
metadata:
  name: sglang-kimi-eagle
spec:
  restartPolicy: Always
  hostIPC: true
  nodeSelector:
    compute.coreweave.com/node-pool: lukas-4h200-pool
  containers:
    - name: sglang
      image: lmsysorg/sglang:latest
      env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HF_HOME
          value: /mnt/tensorized/hf-cache
      command: ["/bin/bash", "-lc"]
      args:
        - |
          exec sglang serve \
            --model-path moonshotai/Kimi-K2.5 \
            --served-model-name moonshotai/Kimi-K2.5 \
            --host 0.0.0.0 \
            --port 8000 \
            --tp-size 8 \
            --context-length 8192 \
            --mem-fraction-static 0.75 \
            --reasoning-parser kimi_k2 \
            --tool-call-parser kimi_k2 \
            --trust-remote-code \
            --speculative-algorithm EAGLE3 \
            --speculative-draft-model-path lightseekorg/kimi-k2.5-eagle3 \
            --speculative-num-steps 3 \
            --speculative-eagle-topk 1 \
            --speculative-num-draft-tokens 4
      resources:
        limits:
          nvidia.com/gpu: 8
      ports:
        - containerPort: 8000
      volumeMounts:
        - name: tensorized
          mountPath: /mnt/tensorized
  volumes:
    - name: tensorized
      persistentVolumeClaim:
        claimName: tensorized-models
