apiVersion: v1
kind: Pod
metadata:
  name: vllm-kimi
spec:
  restartPolicy: Always
  hostIPC: true
  nodeSelector:
    compute.coreweave.com/node-pool: lukas-4h200-pool
  containers:
    - name: vllm
      image: vllm/vllm-openai:nightly
      env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -e
          exec vllm serve moonshotai/Kimi-K2.5 \
            --tensor-parallel-size 8 \
            --trust-remote-code \
            --mm-encoder-tp-mode data \
            --tool-call-parser kimi_k2 \
            --reasoning-parser kimi_k2 \
            --enable-auto-tool-choice \
            --max-model-len 8192 \
            --gpu-memory-utilization 0.9 \
            --download-dir /mnt/tensorized/hf-cache \
            --served-model-name moonshotai/Kimi-K2.5
      resources:
        limits:
          nvidia.com/gpu: 8
      ports:
        - containerPort: 8000
      volumeMounts:
        - name: tensorized
          mountPath: /mnt/tensorized
        - name: workspace
          mountPath: /workspace
  volumes:
    - name: tensorized
      persistentVolumeClaim:
        claimName: tensorized-models
    - name: workspace
      persistentVolumeClaim:
        claimName: cuda-workspace
